<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Dark background -->
  <rect width="200" height="200" fill="#0f0f0f"/>
  
  <!-- Subtle gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f1e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0a574;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="url(#bgGrad)"/>
  
  <!-- Gold accent circle (subtle) -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#d0a574" stroke-width="2" opacity="0.3"/>
  
  <!-- "md" text with gradient -->
  <text 
    x="100" 
    y="120" 
    font-family="Georgia, serif" 
    font-size="90" 
    font-weight="500" 
    text-anchor="middle" 
    fill="url(#textGrad)"
    letter-spacing="-2"
  >md</text>
</svg>
