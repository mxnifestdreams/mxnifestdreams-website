<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Dark background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f1e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0a574;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Subtle accent circle -->
  <circle cx="600" cy="315" r="300" fill="none" stroke="#d0a574" stroke-width="1" opacity="0.2"/>
  
  <!-- "md" logo - large -->
  <text 
    x="600" 
    y="280" 
    font-family="Georgia, serif" 
    font-size="200" 
    font-weight="500" 
    text-anchor="middle" 
    fill="url(#textGrad)"
    letter-spacing="-5"
  >md</text>
  
  <!-- Tagline -->
  <text 
    x="600" 
    y="380" 
    font-family="Georgia, serif" 
    font-size="42" 
    font-weight="400" 
    text-anchor="middle" 
    fill="#f5f1e8"
  >Conscious Manifesting Coach</text>
  
  <!-- Subtext -->
  <text 
    x="600" 
    y="430" 
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
    font-size="24" 
    font-weight="400" 
    text-anchor="middle" 
    fill="#d0ccbe"
  >Become the version of you who already has what you want</text>
</svg>
