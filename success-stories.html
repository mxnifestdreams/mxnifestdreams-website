<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success Stories | mxnifestdreams</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark: #0a0a0a;
            --darkgray: #1a1a1a;
            --gray: #2a2a2a;
            --gold: #d4af37;
            --burgundy: #8b3a3a;
            --text: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
        }

        /* Header */
        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--gray);
            animation: fadeIn 0.6s ease-out;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--gold), var(--burgundy));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* Gallery Container */
        .gallery-container {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .story-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 3/4;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(212, 175, 55, 0.1);
            background: var(--darkgray);
        }

        .story-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease-out;
        }

        .story-card:hover {
            transform: scale(1.02);
            border-color: var(--gold);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.15);
        }

        .story-card:hover img {
            transform: scale(1.05);
        }

        .story-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.4) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }

        .story-card:hover .story-overlay {
            opacity: 1;
        }

        .overlay-text {
            font-size: 0.85rem;
            color: var(--text);
            font-weight: 500;
        }

        /* Sticky CTA Button */
        .sticky-cta {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .cta-button {
            background: linear-gradient(135deg, var(--gold), var(--burgundy));
            color: var(--dark);
            border: none;
            padding: 16px 28px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 16px 40px rgba(212, 175, 55, 0.25);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 60px rgba(212, 175, 55, 0.35);
        }

        .cta-button:active {
            transform: translateY(-2px);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--darkgray);
            border: 1px solid var(--gray);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--gold);
        }

        .modal h2 {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--gold), var(--burgundy));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal p {
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .conversion-paths {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .path-button {
            padding: 16px 20px;
            border: 1px solid var(--gray);
            border-radius: 10px;
            background: transparent;
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .path-button:hover {
            background: var(--gray);
            border-color: var(--gold);
            transform: translateX(4px);
        }

        .path-button.primary {
            background: linear-gradient(135deg, var(--gold), var(--burgundy));
            color: var(--dark);
            border: none;
        }

        .path-button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.25);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            header p {
                font-size: 0.9rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 16px;
            }

            .sticky-cta {
                bottom: 20px;
                right: 20px;
            }

            .cta-button {
                padding: 14px 24px;
                font-size: 0.9rem;
            }

            .modal-content {
                padding: 30px 24px;
            }

            .modal h2 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 30px 16px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .gallery-container {
                margin: 40px auto;
                padding: 0 16px;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .sticky-cta {
                bottom: 16px;
                right: 16px;
            }

            .cta-button {
                padding: 12px 20px;
                font-size: 0.85rem;
            }

            .modal-content {
                width: 95%;
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Real Results</h1>
        <p>See what people are creating when they make the shift.</p>
    </header>

    <!-- Gallery -->
    <div class="gallery-container">
        <div class="gallery-grid" id="gallery">
            <!-- Stories will be injected here -->
        </div>
    </div>

    <!-- Sticky CTA Button -->
    <div class="sticky-cta">
        <button class="cta-button" onclick="openModal()">
            Be Your Next Success Story
        </button>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h2>You Already Have It</h2>
            <p>These results start with you deciding the version of you who already has it. That's where the discipline comes in. Let's work together.</p>
            
            <div class="conversion-paths">
                <button class="path-button primary" onclick="goTo('calendly')">
                    ✓ 1:1 Coaching (€50–90)
                </button>
                <button class="path-button" onclick="goTo('innerroom')">
                    ✓ Join The Inner Room (€10/month)
                </button>
                <button class="path-button" onclick="goTo('guide')">
                    ✓ Free Self-Concept Guide
                </button>
            </div>
        </div>
    </div>

    <script>
        // Generate gallery cards
        const storyCount = 16;
        const galleryHTML = Array.from({ length: storyCount }, (_, i) => {
            const num = String(i + 1).padStart(2, '0');
            return `
                <div class="story-card">
                    <img src="/success-stories/story_${num}.jpg" alt="Success story ${num}" loading="lazy">
                    <div class="story-overlay">
                        <span class="overlay-text">Real transformation</span>
                    </div>
                </div>
            `;
        }).join('');

        document.getElementById('gallery').innerHTML = galleryHTML;

        // Modal controls
        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Conversion path navigation
        function goTo(path) {
            switch(path) {
                case 'calendly':
                    window.open('https://calendly.com/mxnifestdreams', '_blank');
                    break;
                case 'innerroom':
                    window.open('https://mxnifestdreams.substack.com', '_blank');
                    break;
                case 'guide':
                    // Link to your free guide
                    window.open('https://beacons.ai/mxnifestdreams', '_blank');
                    break;
            }
            closeModal();
        }

        // Close modal on background click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Close on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
